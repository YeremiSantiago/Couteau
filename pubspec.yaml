name: tarea6
description: "Tarea 6 - Multi-tool Flutter App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  lottie: ^3.1.0
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  audioplayers: ^6.1.0
  url_launcher: ^6.2.5
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.jpg"
  adaptive_icon_background: "#000000"  # ← mismo color que tu foto
  adaptive_icon_foreground: "assets/images/app_icon.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
